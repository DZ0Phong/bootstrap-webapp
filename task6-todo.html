<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap WebApp - To-Do List & Meeting Planner</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .header-title {
            font-weight: 700;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }

        .header-title img {
            width: 40px;
            height: 40px;
        }

        .custom-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 24px;
            padding: 24px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #0f172a;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border-color: #cbd5e1;
            padding: 10px 14px;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }

        /* Task List */
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .task-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .task-title {
            color: #475569;
            font-weight: 500;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .btn-done {
            background-color: #10b981;
            color: white;
            font-weight: 600;
            border-radius: 6px;
            padding: 6px 16px;
            border: none;
        }

        .btn-done:hover {
            background-color: #059669;
            color: white;
        }

        .btn-outline-meeting {
            background-color: transparent;
            border: 1px solid #cbd5e1;
            color: #64748b;
            font-weight: 500;
            border-radius: 6px;
            padding: 6px 16px;
        }

        .btn-outline-meeting:hover {
            background-color: #f1f5f9;
            color: #475569;
        }

        /* Calendar Item */
        .calendar-item {
            background-color: #d1fae5;
            color: #065f46;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #a7f3d0;
        }

        /* Custom Timepicker Dropdown */
        .timepicker-dropdown {
            width: 300px;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .timepicker-container {
            display: flex;
            height: 200px;
        }

        .timepicker-col {
            flex: 1;
            overflow-y: auto;
            border-right: 1px solid #f1f5f9;
            text-align: center;
        }

        .timepicker-col:last-child {
            border-right: none;
        }

        /* Hide Scrollbar */
        .timepicker-col::-webkit-scrollbar { width: 0px; }
        .timepicker-col { -ms-overflow-style: none; scrollbar-width: none; }

        .timepicker-item {
            padding: 10px 0;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
            color: #475569;
        }

        .timepicker-item:hover {
            background: #f8fafc;
        }

        .timepicker-item.active {
            background: #2563eb;
            color: white;
            font-weight: 600;
        }

        /* Modal Details */
        .modal-content {
            border-radius: 16px;
            border: none;
        }
        
        .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding: 20px 24px;
        }

        .modal-body {
            padding: 24px;
        }

        .btn-save-meeting {
            background-color: #10b981;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 8px;
        }
        
        .btn-save-meeting:hover {
            background-color: #059669;
        }

        .input-group-text {
            background-color: white;
            border-left: none;
            color: #64748b;
        }

        .form-control.border-end-0 {
            border-right: none;
        }
    </style>
</head>
<body>

    <main class="container my-4 pb-5" style="max-width: 900px;">
        <div class="mb-3">
            <a href="index.html" class="text-decoration-none fw-medium" style="color: #64748b;"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
        </div>

        <h2 class="header-title">
            <span style="font-size: 2.2rem;">🗓️</span> To-Do List & Meeting Planner
        </h2>

        <!-- Add Task Card -->
        <div class="custom-card">
            <div class="section-title">Add Task</div>
            <form id="add-task-form" class="row g-3 align-items-center">
                <div class="col-md-5">
                    <input type="text" class="form-control" id="task-title" placeholder="Task Title" required>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <input type="date" class="form-control border-end-0" id="task-date" required>
                        <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">Add Task</button>
                </div>
            </form>
        </div>

        <!-- Tasks Card -->
        <div class="custom-card">
            <div class="section-title">Tasks</div>
            <div id="tasks-container">
                <!-- Tasks will be injected here -->
            </div>
        </div>

        <!-- Calendar Card -->
        <div class="custom-card mb-5">
            <div class="section-title">Calendar</div>
            <div id="calendar-container">
                <!-- Completed tasks will be logged here -->
            </div>
        </div>
    </main>

    <!-- Create Meeting Modal -->
    <div class="modal fade" id="meetingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Create Meeting</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="meeting-form">
                        <input type="hidden" id="meeting-task-id">
                        
                        <div class="mb-3">
                            <input type="text" class="form-control" id="meeting-title" readonly>
                        </div>
                        
                        <div class="mb-3 input-group position-relative">
                            <input type="date" class="form-control border-end-0" id="meeting-date" required>
                            <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                        </div>

                        <!-- Custom Time Picker Input -->
                        <div class="mb-3 position-relative dropdown">
                            <div class="input-group" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
                                <input type="text" class="form-control border-end-0" id="meeting-time" placeholder="09:00 PM" readonly style="cursor: pointer; background: white;">
                                <span class="input-group-text"><i class="bi bi-clock"></i></span>
                            </div>
                            
                            <!-- Dropdown Menu Custom -->
                            <div class="dropdown-menu timepicker-dropdown p-0" onclick="event.stopPropagation()">
                                <div class="timepicker-container" id="timepicker-scroll-container">
                                    <div class="timepicker-col" id="col-hour">
                                        <!-- Hours populated via JS -->
                                    </div>
                                    <div class="timepicker-col" id="col-minute">
                                        <!-- Minutes populated via JS -->
                                    </div>
                                    <div class="timepicker-col" id="col-period">
                                        <div class="timepicker-item" data-type="period" data-val="AM">AM</div>
                                        <div class="timepicker-item active" data-type="period" data-val="PM">PM</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <input type="text" class="form-control" id="meeting-attendees" placeholder="Attendees (comma separated)">
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-save-meeting">Save Meeting</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="task6.js"></script>
</body>
</html>
