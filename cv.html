<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #f6f1e8;
            --muted: rgba(233, 225, 211, 0.78);
            --surface: rgba(16, 22, 34, 0.78);
            --line: rgba(209, 189, 151, 0.2);
            --gold: #f1d39a;
            --shadow: 0 30px 60px rgba(2, 6, 23, 0.3);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 18%, rgba(220, 192, 138, 0.14), transparent 16%),
                radial-gradient(circle at 78% 12%, rgba(118, 88, 56, 0.18), transparent 18%),
                linear-gradient(135deg, #090d16 0%, #111827 45%, #1b2232 100%);
        }

        .page-shell {
            max-width: 1320px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .toolbar-link,
        .toolbar-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(17, 22, 34, 0.58);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .viewer-card {
            border-radius: 32px;
            border: 1px solid var(--line);
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .viewer-head {
            padding: 28px 28px 20px;
            border-bottom: 1px solid var(--line);
        }

        .viewer-title {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            color: var(--gold);
        }

        .viewer-copy {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.7;
            max-width: 760px;
        }

        .pdf-frame {
            width: 100%;
            height: min(78vh, 980px);
            border: 0;
            background: white;
        }

        .empty-state {
            padding: 80px 24px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .page-shell {
                padding: 20px 14px 30px;
            }

            .viewer-head {
                padding: 22px 20px 18px;
            }

            .pdf-frame {
                height: 72vh;
            }
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <div class="toolbar">
            <div class="toolbar-group">
                <a class="toolbar-link" href="team-members.html"><i class="bi bi-arrow-left"></i>Back to Team</a>
                <a class="toolbar-link" href="index.html"><i class="bi bi-grid"></i>Dashboard</a>
            </div>
            <div class="toolbar-group">
                <a class="toolbar-button" id="openPdfButton" href="#" target="_blank" rel="noopener noreferrer"><i class="bi bi-box-arrow-up-right"></i><span>Open PDF</span></a>
                <a class="toolbar-button" id="downloadPdfButton" href="#" download><i class="bi bi-download"></i><span>Download PDF</span></a>
            </div>
        </div>

        <main class="viewer-card" id="viewerRoot">
            <div class="empty-state">
                <h1 class="fw-bold">Loading CV...</h1>
                <p class="mb-0 text-white-50">Please wait while the PDF viewer is prepared.</p>
            </div>
        </main>
    </div>

    <script>
        const DATA_URL = "data/team-members.json";
        const viewerRoot = document.getElementById("viewerRoot");
        const openPdfButton = document.getElementById("openPdfButton");
        const downloadPdfButton = document.getElementById("downloadPdfButton");
        const params = new URLSearchParams(window.location.search);
        const memberId = params.get("id") || "tran-quang-hieu";

        async function loadViewer() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) {
                    throw new Error("Failed to load team data");
                }

                const members = await response.json();
                const member = members.find(item => item.id === memberId) || members[0];
                document.title = `${member.name} - CV Viewer`;
                openPdfButton.href = member.cvPdf;
                downloadPdfButton.href = member.cvPdf;

                viewerRoot.innerHTML = `
                    <section class="viewer-head">
                        <h1 class="viewer-title">${member.name}</h1>
                        <p class="viewer-copy">This page keeps the experience simple and clean: you can go back to the team page, open the original PDF in a separate tab, or download it directly.</p>
                    </section>
                    <iframe class="pdf-frame" src="${member.cvPdf}" title="${member.name} PDF CV"></iframe>
                `;
            } catch (error) {
                viewerRoot.innerHTML = `
                    <div class="empty-state">
                        <h1 class="fw-bold">Unable to load PDF viewer</h1>
                        <p class="mb-0 text-white-50">Please check the JSON file and PDF paths.</p>
                    </div>
                `;
            }
        }

        loadViewer();
    </script>
</body>

</html>
