<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap WebApp - Weather Widget</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .weather-card {
            max-width: 900px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        .weather-location {
            color: #212529;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .weather-status {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .current-weather {
            display: flex;
            align-items: center;
            margin-top: 25px;
            gap: 20px;
        }

        .weather-icon-large {
            font-size: 6rem;
            line-height: 1;
            color: #111;
        }

        .temperature-large {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            display: flex;
            align-items: flex-start;
            color: #212529;
        }

        .temperature-large span {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 8px;
            margin-left: 4px;
        }

        .temperature-large small {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 50px;
            margin-left: 2px;
            color: #212529;
        }

        .weather-stats {
            color: #6c757d;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-left: 30px;
        }

        /* Nav Pills */
        .weather-nav {
            margin-top: 40px;
            gap: 12px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 5px;
            border-bottom: 0;
        }

        .weather-nav .nav-link {
            border: 1px solid #ced4da;
            border-radius: 20px;
            color: #6c757d;
            padding: 8px 18px;
            font-size: 0.95rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .weather-nav .nav-link:hover {
            background-color: #f8f9fa;
        }

        .weather-nav .nav-link.active {
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: white;
            font-weight: 500;
        }

        .weather-nav i {
            font-size: 1.1em;
        }

        /* Hourly & Daily Forecast Container */
        .forecast-container {
            border: 1px solid #ced4da;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        .forecast-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 60px;
        }

        .forecast-time {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 500;
        }

        .forecast-value {
            font-size: 0.95rem;
            color: #212529;
            font-weight: 500;
        }

        .forecast-icon {
            font-size: 1.35rem;
            color: #6c757d;
        }

        .divider {
            height: 1px;
            background-color: #dee2e6;
            margin: 25px 0;
        }

        .daily-icon {
            font-size: 1.8rem;
            color: #212529;
        }

        .daily-temp {
            font-size: 0.9rem;
            color: #495057;
            margin-top: 5px;
        }

        /* Custom scrollbar for horizontal scroll */
        .weather-nav::-webkit-scrollbar {
            height: 4px;
        }

        .weather-nav::-webkit-scrollbar-thumb {
            background-color: #ced4da;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-light">

    <main class="container">
        <!-- Back Link -->
        <div class="mt-4">
            <a href="index.html" class="text-decoration-none text-primary fw-medium">&larr; Back to Dashboard</a>
        </div>

        <div class="weather-card">
            <!-- Header -->
            <div class="weather-header">
                <h2 class="weather-location" id="w-location">Hà Nội, Vietnam</h2>
                <div class="weather-status" id="w-status">Loading weather...</div>
            </div>

            <!-- Current Conditions -->
            <div class="current-weather">
                <div class="weather-icon-large align-self-center" id="w-main-icon">
                    <i class="bi bi-hourglass-split text-dark"></i>
                </div>
                <div class="temperature-large align-self-center">
                    <span id="w-temp"
                        style="font-size: 5rem; margin-top: 0; margin-left: 0;">--</span><span>&deg;</span><small
                        class="fs-4 mt-4 ms-1">F</small>
                </div>
                <div class="weather-stats align-self-center">
                    <div id="w-precip">Precipitation: --%</div>
                    <div id="w-humid">Humidity: --%</div>
                    <div id="w-wind">Wind: -- mph</div>
                    <div id="w-uv">UV Index: --</div>
                </div>
            </div>

            <!-- Nav Pills -->
            <ul class="nav nav-pills weather-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-metric="temperature"><i class="bi bi-thermometer-half"></i> Temperature</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-metric="precipitation"><i class="bi bi-cloud-rain"></i> Precipitation</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-metric="wind"><i class="bi bi-wind"></i> Wind</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-metric="aqi"><i class="bi bi-cloud-haze"></i> Air Quality</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-metric="uv"><i class="bi bi-brightness-high"></i> UV Index</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-metric="sun"><i class="bi bi-sunrise"></i> Sunset and Sunrise</a>
                </li>
            </ul>

            <!-- Forecast Container -->
            <div class="forecast-container">
                <!-- Hourly Forecast -->
                <div class="forecast-row" id="hourly-forecast-container">
                    <!-- Hourly items dynamically injected here -->
                </div>

                <div class="divider"></div>

                <!-- Daily Forecast -->
                <div class="forecast-row" id="daily-forecast-container">
                    <!-- Daily items dynamically injected here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="weather.js"></script> <!-- Link to our new weather script -->
</body>

</html>
