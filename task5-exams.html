<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap WebApp - Skill Exams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #f4f7fb;
            --nav-bg: #23272b;
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --border: #d7dfeb;
            --text-main: #162033;
            --text-muted: #667085;
            --success-bg: #e8f7ee;
            --success-text: #18794e;
            --danger-bg: #fff0f0;
            --danger-text: #c0392b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        .topbar {
            background: var(--nav-bg);
            padding: 22px 0;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .topbar-title {
            color: #fff;
            font-weight: 800;
            font-size: 1.95rem;
            margin: 0;
        }

        .page-shell {
            padding: 36px 0 72px;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--primary-dark);
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 34px;
        }

        .filter-btn {
            min-width: 82px;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            border: 1px solid var(--primary);
            color: var(--primary);
            background: #fff;
            transition: all 0.2s ease;
        }

        .filter-btn.active,
        .filter-btn:hover {
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
        }

        .exam-card {
            background: #fff;
            border: 1px solid #d4dae4;
            border-radius: 14px;
            padding: 30px 26px;
            text-align: center;
            height: 100%;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.04);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .exam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
        }

        .exam-title {
            font-size: 1.85rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .exam-description {
            font-size: 1rem;
            line-height: 1.6;
            color: #172b4d;
            margin-bottom: 22px;
            min-height: 76px;
        }

        .primary-btn {
            border-radius: 10px;
            padding: 10px 22px;
            font-weight: 700;
        }

        .quiz-wrapper,
        .result-wrapper,
        .review-wrapper {
            max-width: 860px;
            margin: 48px auto 0;
        }

        .panel-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px 38px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.09);
        }

        .question-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
            font-weight: 800;
            font-size: 1.05rem;
        }

        .progress {
            height: 24px;
            border-radius: 999px;
            background: #e4e9f0;
            margin-bottom: 28px;
        }

        .progress-bar {
            font-weight: 700;
        }

        .question-text {
            font-size: 1.95rem;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .answer-option {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 16px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }

        .answer-option:hover {
            border-color: var(--primary);
            background: #f5f9ff;
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: #eaf2ff;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.08);
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 28px;
        }

        .result-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 2.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .result-score,
        .result-percent {
            font-size: 1.55rem;
            margin-bottom: 16px;
        }

        .review-item {
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 18px;
            background: #fff;
        }

        .review-question {
            font-weight: 700;
            font-size: 1.08rem;
            margin-bottom: 14px;
        }

        .review-answer {
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 0.97rem;
        }

        .review-answer.correct {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .review-answer.wrong {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .review-answer.neutral {
            background: #f8fafc;
            color: #475467;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .status-pill.pass {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-pill.fail {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .topbar-title {
                font-size: 1.55rem;
            }

            .panel-card {
                padding: 24px 20px;
                border-radius: 20px;
            }

            .question-text,
            .result-title {
                font-size: 1.9rem;
            }

            .quiz-actions {
                flex-direction: column;
            }

            .quiz-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="container">
            <h1 class="topbar-title" id="page-title">Tech Skill Exams</h1>
        </div>
    </header>

    <main class="page-shell">
        <div class="container">
            <div class="mb-4">
                <a href="index.html" class="back-link"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
            </div>

            <section id="catalog-view">
                <div class="filter-bar" id="filter-bar"></div>
                <div class="row g-4" id="exam-grid"></div>
            </section>

            <section id="quiz-view" class="quiz-wrapper hidden">
                <div class="panel-card">
                    <div class="question-meta">
                        <div id="question-counter">Question 1 / 10</div>
                        <div id="question-percent">10%</div>
                    </div>
                    <div class="progress" role="progressbar" aria-label="Exam progress" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-primary" id="progress-bar" style="width: 10%;"></div>
                    </div>
                    <h2 class="question-text" id="question-text">Question text</h2>
                    <div id="answers-list"></div>
                    <div class="quiz-actions">
                        <button type="button" class="btn btn-secondary primary-btn" id="prev-btn">Previous</button>
                        <button type="button" class="btn btn-primary primary-btn ms-auto" id="next-btn">Next</button>
                    </div>
                </div>
            </section>

            <section id="result-view" class="result-wrapper hidden">
                <div class="panel-card text-center">
                    <div class="result-icon"><i class="bi bi-trophy-fill text-warning"></i></div>
                    <div class="result-title">Exam Completed!</div>
                    <div class="result-score" id="result-score">Your Score: 0 / 10</div>
                    <div class="result-percent" id="result-percent">Percentage: 0%</div>
                    <div id="result-status"></div>
                    <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
                        <button type="button" class="btn btn-primary primary-btn" id="review-btn">Review Exam</button>
                        <button type="button" class="btn btn-outline-primary primary-btn" id="retake-btn">Retake Exam</button>
                        <button type="button" class="btn btn-outline-secondary primary-btn" id="catalog-btn">Back to Exams</button>
                    </div>
                </div>
            </section>

            <section id="review-view" class="review-wrapper hidden">
                <div class="panel-card">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                        <div>
                            <h2 class="fw-bold mb-1">Review Answers</h2>
                            <div class="text-muted" id="review-summary">Check your selected answers and the correct ones.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-primary primary-btn" id="review-retake-btn">Retake</button>
                            <button type="button" class="btn btn-primary primary-btn" id="review-catalog-btn">Back to Exams</button>
                        </div>
                    </div>
                    <div id="review-list"></div>
                </div>
            </section>
        </div>
    </main>

        const state = {

        function renderFilters() {
            filterBar.innerHTML = filters.map(filter => `
                <button class="filter-btn ${state.filter === filter ? "active" : ""}" data-filter="${filter}">${filter}</button>
            `).join("");

            filterBar.querySelectorAll(".filter-btn").forEach(button => {
                button.addEventListener("click", () => {
                    state.filter = button.dataset.filter;
                    renderFilters();
                    renderCatalog();
                });
            });
        }

        function renderCatalog() {
            const filteredExams = state.filter === "All"
                ? examCatalog
                : examCatalog.filter(exam => exam.language === state.filter);

            examGrid.innerHTML = filteredExams.map(exam => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="exam-card">
                        <h2 class="exam-title">${exam.title}</h2>
                        <p class="exam-description">${exam.description}</p>
                        <button class="btn btn-primary primary-btn start-exam-btn" data-exam-id="${exam.id}">Take Exam</button>
                    </div>
                </div>
            `).join("");

            examGrid.querySelectorAll(".start-exam-btn").forEach(button => {
                button.addEventListener("click", () => {
                    const selectedExam = examCatalog.find(exam => exam.id === button.dataset.examId);
                    startExam(selectedExam);
                });
            });
        }

        function showView(viewName) {
            catalogView.classList.add("hidden");
            quizView.classList.add("hidden");
            resultView.classList.add("hidden");
            reviewView.classList.add("hidden");

            if (viewName === "catalog") {
                catalogView.classList.remove("hidden");
                pageTitle.textContent = "Tech Skill Exams";
            }

            if (viewName === "quiz") {
                quizView.classList.remove("hidden");
                pageTitle.textContent = `${state.exam.title} Exam`;
            }

            if (viewName === "result") {
                resultView.classList.remove("hidden");
                pageTitle.textContent = `${state.exam.title} Exam`;
            }

            if (viewName === "review") {
                reviewView.classList.remove("hidden");
                pageTitle.textContent = `${state.exam.title} Exam`;
            }
        }

        function startExam(exam) {
            state.exam = exam;
            state.currentQuestionIndex = 0;
            state.answers = new Array(exam.questions.length).fill(null);
            showView("quiz");
            renderQuestion();
        }

        function renderQuestion() {
            const totalQuestions = state.exam.questions.length;
            const currentNumber = state.currentQuestionIndex + 1;
            const progress = Math.round((currentNumber / totalQuestions) * 100);
            const currentQuestion = state.exam.questions[state.currentQuestionIndex];

            questionCounter.textContent = `Question ${currentNumber} / ${totalQuestions}`;
            questionPercent.textContent = `${progress}%`;
            progressBar.style.width = `${progress}%`;
            progressBar.setAttribute("aria-valuenow", progress);
            questionText.textContent = currentQuestion.question;

            answersList.innerHTML = currentQuestion.options.map((option, index) => `
                <button type="button" class="answer-option w-100 text-start ${state.answers[state.currentQuestionIndex] === index ? "selected" : ""}" data-option-index="${index}">
                    ${option}
                </button>
            `).join("");

            answersList.querySelectorAll(".answer-option").forEach(button => {
                button.addEventListener("click", () => {
                    state.answers[state.currentQuestionIndex] = Number(button.dataset.optionIndex);
                    renderQuestion();
                });
            });

            prevBtn.disabled = state.currentQuestionIndex === 0;
            nextBtn.textContent = currentNumber === totalQuestions ? "Submit" : "Next";
        }

        function finishExam() {
            const totalQuestions = state.exam.questions.length;
            let correctCount = 0;

            state.exam.questions.forEach((question, index) => {
                if (state.answers[index] === question.answer) {
                    correctCount += 1;
                }
            });

            const percentage = Math.round((correctCount / totalQuestions) * 100);
            resultScore.textContent = `Your Score: ${correctCount} / ${totalQuestions}`;
            resultPercent.textContent = `Percentage: ${percentage}%`;
            resultStatus.innerHTML = percentage >= 70
                ? `<span class="status-pill pass"><i class="bi bi-check-circle-fill"></i>Passed</span>`
                : `<span class="status-pill fail"><i class="bi bi-x-circle-fill"></i>Needs Improvement</span>`;

            showView("result");
        }

        function renderReview() {
            let correctCount = 0;

            reviewList.innerHTML = state.exam.questions.map((question, index) => {
                const userAnswerIndex = state.answers[index];
                const correctAnswerIndex = question.answer;
                const isCorrect = userAnswerIndex === correctAnswerIndex;

                if (isCorrect) {
                    correctCount += 1;
                }

                const userAnswerText = userAnswerIndex === null
                    ? "No answer selected"
                    : question.options[userAnswerIndex];

                return `
                    <div class="review-item">
                        <div class="review-question">Question ${index + 1}. ${question.question}</div>
                        <div class="review-answer ${isCorrect ? "correct" : "wrong"}">
                            <strong>Your answer:</strong> ${userAnswerText}
                        </div>
                        <div class="review-answer neutral">
                            <strong>Correct answer:</strong> ${question.options[correctAnswerIndex]}
                        </div>
                    </div>
                `;
            }).join("");

            reviewSummary.textContent = `You answered ${correctCount} out of ${state.exam.questions.length} questions correctly.`;
            showView("review");
        }

        prevBtn.addEventListener("click", () => {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex -= 1;
                renderQuestion();
            }
        });

        nextBtn.addEventListener("click", () => {
            if (state.currentQuestionIndex === state.exam.questions.length - 1) {
                finishExam();
                return;
            }

            state.currentQuestionIndex += 1;
            renderQuestion();
        });

        document.getElementById("review-btn").addEventListener("click", renderReview);
        document.getElementById("retake-btn").addEventListener("click", () => startExam(state.exam));
        document.getElementById("catalog-btn").addEventListener("click", () => showView("catalog"));
        document.getElementById("review-retake-btn").addEventListener("click", () => startExam(state.exam));
        document.getElementById("review-catalog-btn").addEventListener("click", () => showView("catalog"));

        renderFilters();
        renderCatalog();
        showView("catalog");
    </script>
</body>

</html>
