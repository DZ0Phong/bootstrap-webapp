<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap WebApp - Online Events</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9fc;
            color: #1a1d20;
        }

        .page-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .page-header h2 {
            font-weight: 700;
            color: #0f172a;
            position: relative;
            display: inline-block;
        }

        .event-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .event-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
            border-bottom: 1px solid #f1f5f9;
        }

        .event-body {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .event-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1e293b;
            line-height: 1.4;
        }

        .event-detail {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .event-detail i {
            color: #3b82f6;
            font-size: 1.1rem;
            margin-top: -2px;
        }

        .checkin-btn {
            margin-top: auto;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            background-color: #2563eb;
            border-color: #2563eb;
            transition: background-color 0.2s ease;
        }

        .checkin-btn:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }

        /* Modal Customization */
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding: 24px 32px 16px;
        }

        .modal-body {
            padding: 32px;
            text-align: center;
        }

        .modal-footer {
            border-top: none;
            padding: 16px 32px 32px;
        }

        .qr-placeholder {
            width: 250px;
            height: 250px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <main class="container my-5 pb-5">
        <!-- Back Link -->
        <div class="mb-4">
            <a href="index.html" class="text-decoration-none text-primary fw-medium"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
        </div>

        <div class="page-header mt-4">
            <h2>🎉 Upcoming Online Events</h2>
            <p class="text-muted mt-2">Join our exclusive virtual sessions to learn and grow.</p>
        </div>

        <div class="row g-4" id="events-grid">
            <!-- Events will be rendered here via JS -->
        </div>

    </main>

    <!-- Check-In Modal -->
    <div class="modal fade" id="checkInModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header flex-column border-0 pb-0 position-relative">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-4" data-bs-dismiss="modal" aria-label="Close"></button>
                    <h4 class="modal-title fw-bold text-dark w-100 text-center" id="modal-event-title">Event Check-In</h4>
                </div>
                <div class="modal-body">
                    <div id="modal-event-name" class="fw-bold mb-1 text-dark fs-5">Event Name</div>
                    <div id="modal-event-time" class="text-muted small mb-4">Date & Time</div>
                    
                    <div class="qr-placeholder" id="qr-container">
                        <img id="qr-code-img" src="" alt="QR Code for Check-In">
                    </div>
                    
                    <p class="mt-4 text-muted small mb-0">Use your smartphone camera to scan this QR code and complete your registration.</p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-secondary px-5 py-2 rounded-3 text-white fw-medium" data-bs-dismiss="modal" style="background-color: #64748b; border:none;">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Data for 9 upcoming events
        const eventsData = [
            { id: 1, title: "Tech Innovation Summit", date: "Dec 10, 2025", time: "10:00 AM - 12:00 PM", venue: "Online (Zoom)", image: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 2, title: "Digital Marketing Workshop", date: "Dec 11, 2025", time: "2:00 PM - 4:00 PM", venue: "Online (Zoom)", image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 3, title: "Leadership & Team Building", date: "Dec 12, 2025", time: "9:00 AM - 11:00 AM", venue: "Online (Google Meet)", image: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 4, title: "AI & Machine Learning Bootcamp", date: "Dec 14, 2025", time: "1:00 PM - 3:00 PM", venue: "Online (Zoom)", image: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 5, title: "Entrepreneurship Talk", date: "Dec 15, 2025", time: "5:00 PM - 6:30 PM", venue: "Online (Zoom)", image: "https://images.unsplash.com/photo-1515169067868-5387ec356754?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 6, title: "UI/UX Design Conference", date: "Dec 16, 2025", time: "7:00 PM - 9:00 PM", venue: "Online (Google Meet)", image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 7, title: "Cloud Computing Basics", date: "Dec 18, 2025", time: "10:00 AM - 11:30 AM", venue: "Online (MS Teams)", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 8, title: "Cybersecurity Best Practices", date: "Dec 20, 2025", time: "3:00 PM - 4:30 PM", venue: "Online (Zoom)", image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" },
            { id: 9, title: "Web Development Trends 2026", date: "Dec 22, 2025", time: "11:00 AM - 1:00 PM", venue: "Online (Google Meet)", image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" }
        ];

        // GOOGLE FORM LINK (Replace this placeholder with the actual form link created by the user)
        // You can specify the google form link here.
        let GOOGLE_FORM_LINK = "https://forms.gle/q3tYxgeRa1fA5WAG9";

        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById('events-grid');
            
            // Render events
            eventsData.forEach(event => {
                const col = document.createElement('div');
                col.className = 'col-12 col-md-6 col-lg-4';
                
                col.innerHTML = `
                    <div class="event-card">
                        <img src="${event.image}" alt="${event.title}" class="event-img">
                        <div class="event-body">
                            <h3 class="event-title">${event.title}</h3>
                            <div class="event-detail">
                                <i class="bi bi-calendar3"></i>
                                <span><strong>Date:</strong> ${event.date}</span>
                            </div>
                            <div class="event-detail">
                                <i class="bi bi-clock"></i>
                                <span><strong>Time:</strong> ${event.time}</span>
                            </div>
                            <div class="event-detail mb-4">
                                <i class="bi bi-geo-alt"></i>
                                <span><strong>Venue:</strong> ${event.venue}</span>
                            </div>
                            <button class="btn btn-primary w-100 checkin-btn" data-id="${event.id}">Check In</button>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });

            // Handle Check-in button clicks
            const modal = new bootstrap.Modal(document.getElementById('checkInModal'));
            const qrImg = document.getElementById('qr-code-img');
            const modalName = document.getElementById('modal-event-name');
            const modalTime = document.getElementById('modal-event-time');

            document.querySelectorAll('.checkin-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const eventId = parseInt(e.target.getAttribute('data-id'));
                    const event = eventsData.find(ev => ev.id === eventId);
                    
                    if(event) {
                        modalName.textContent = event.title;
                        modalTime.textContent = `${event.date} • ${event.time}`;
                        
                        // Generate QR code using public API pointing to the google form.
                        // We can append a URL parameter so the form potentially pre-fills, or just link directly.
                        if (GOOGLE_FORM_LINK.includes("placeholder")) {
                            // If user hasn't provided the link yet, just show a placeholder QR
                            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=Please%20Insert%20Google%20Form%20Link";
                        } else {
                            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(GOOGLE_FORM_LINK)}`;
                            qrImg.src = qrUrl;
                        }
                        
                        modal.show();
                    }
                });
            });
        });
    </script>
</body>

</html>
